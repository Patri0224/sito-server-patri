<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griglia Dinamica NxN</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <h1>Generatore di Griglia Dinamica</h1>
    <button class="btn-reset" onclick="resetGame()">Reset Game</button>
    <div class="controls">
        <label for="grid-size">Scegli la grandezza della griglia:</label>
        <select id="grid-size" onchange="generateGrid()">
            <option value="3">3 x 3</option>
            <option value="4" selected>4 x 4</option>
            <option value="5">5 x 5</option>
            <option value="6">6 x 6</option>
            <option value="7">7 x 7</option>
            <option value="8">8 x 8</option>
            <option value="9">9 x 9</option>
            <option value="10">10 x 10</option>
        </select>
    </div>

    <div id="grid-container"></div>
</body>

</html>
